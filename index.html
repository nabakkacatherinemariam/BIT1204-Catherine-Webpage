<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>MY FASHION STORE</title>
	<style>
		body{
			font-family: Arial;
			background-color: #f4f4f4;
			text-align: center;
		}

		header{
			background: black;
			color: white;
			padding: 20px;
		}

		nav{
			background: gray;
			padding: 10px;
		}

		nav a{
			margin: 15px;
			color: white;
			text-decoration: none;
			font-weight: bold ;
		}

		section{
			margin: 40px;
		}
		.shoe{
			color: yellow;
			font-size: 20px;
			font-weight: bold;
		}
		.clothes{
			color: red;
			font-size: 20px;
			font-style: italic;
		}
		.bag{
			color: darkblack;
			font-size: 20px;
			text-decoration: underline;
		} 

		input[type=submit]{
			background: black;
			color: white;
			padding: 10px;
			font-size:18px ;
			border: none;
			cursor: pointer;
		}
		footer {
			background: black;
			color: white;
			padding: 15px;
			margin-top: 40px;
			font-size: 14px;
		}
</style>


</head>
<body>
	<header><h1>My Online Fashion Store</h1>
</header>
<nav>
	<nav class="navbar">
	<a href="#shoes"></a>
	<a href="#clothes"></a>
	<a href="#bags"></a>
</nav>

<form>
	
	<section id="shoes">
		<h2>Shoes</h2>
		<label class="shoe">
			<input type="checkbox">Nike Sneakers-<span>$50</span>
		</label><br>

		<label class="shoe">
			<input type="checkbox">Adidas Runners-<span>$45</span>
			</label><br>

		<label class="shoe">
			<input type="checkbox">Leather shoes-<span>$60</span>
		</label>
		
	</section>


	<section id="clothes">
		<h2>Clothes</h2>
		<label class="clothes">
			<input type="checkbox">T-shirts-<span>$20</span>
		</label><br>

		<label class="clothes">
			<input type="checkbox">boyfriend jeans-<span>$25</span>
		</label><br>

		<label class="clothes">
			<input type="checkbox">Hoodie Jackets-<span>$40</span>
		</label><br>
		
	</section>

	<section id="bags">
		<h2>Bags</h2>
		<label class="bags">
			<input type="checkbox">Leather handbag-<span>$30</span>
		</label><br>

		<label class="bags">
			<input type="checkbox">Travel Backpack-<span>25</span>
		</label><br>

	     <label class="bags">
	     	<input type="checkbox"> School Bags-<span>$15</span>
	     </label><br>
	</section>

	<br><br>
	<input type="submit" value="Buy selected items">
</form>
   
<footer id="footer">
	<p>&copy; 2026 Catherine Mariam Nabakka- My Fashion Store</p>
</footer>

</body>

</html>
